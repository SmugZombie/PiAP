<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Network — No Internet Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: .75rem;
    }
    .badge {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      padding: .25rem .75rem;
      margin-bottom: 1.25rem;
    }
    .message {
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: .97rem;
    }
    .divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .details {
      font-size: .82rem;
      color: #999;
      line-height: 1.7;
    }
    .details strong { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128274;</div>
    <h1>Isolated Test Network</h1>
    <div class="badge">No Internet Access</div>
    <p class="message">__CAPTIVE_MESSAGE__</p>
    <hr class="divider">
    <div class="details">
      <strong>This network is intentionally isolated.</strong><br>
      It is provided for authorized testing and lab use only.<br>
      All traffic is contained — no data leaves this network.
    </div>
  </div>
</body>
</html>
